# ─────────────────────────────────────────────────────────────
# Spector Synapse — TEST profile
# Loaded for all tests via @ActiveProfiles("test") or
# -Dspring.profiles.active=test
#
# Disables SpectorMemory auto-configuration so Spring context
# starts instantly for controller/unit tests (no Ollama calls).
# Ollama-live integration tests override these via @TestPropertySource.
# ─────────────────────────────────────────────────────────────
spector:
  port: 0
  api-key: test-key
  data-dir: ${java.io.tmpdir}/spector-test
  ollama:
    base-url: ${SPECTOR_OLLAMA_BASE_URL:http://localhost:11434}
    model: ${SPECTOR_OLLAMA_MODEL:llama3.2}
    embed-model: ${SPECTOR_OLLAMA_EMBED_MODEL:nomic-embed-text}
  memory:
    enabled: false          # disables SpectorAutoConfiguration bean — no Ollama needed
    max-memories: 0
    dimensions: 768
    capacity: 1000
    persistence-mode: IN_MEMORY
    splade-enabled: false
    colbert-enabled: false
  embedding:
    model: nomic-embed-text
    base-url: http://localhost:11434
    batch-size: 32
  metrics:
    enabled: false
  cors:
    allowed-origins: http://localhost:4200

spring:
  application:
    name: spector-synapse-test
  jmx:
    enabled: false

logging:
  level:
    root: WARN
    com.spectrayan.spector: INFO
