# ─────────────────────────────────────────────────────────────
# Spector Synapse — Configuration
# ─────────────────────────────────────────────────────────────
# All settings can be overridden via environment variables:
#   SPECTOR_PORT=7070
#   SPECTOR_API_KEY=your-secret-key
#   SPECTOR_DATA_DIR=./spector-data
#   SPECTOR_OLLAMA_BASE_URL=http://localhost:11434
# ─────────────────────────────────────────────────────────────

spector:
  port: ${SPECTOR_PORT:7070}
  api-key: ${SPECTOR_API_KEY:spector-dev-key}
  data-dir: ${SPECTOR_DATA_DIR:./spector-data}
  ollama:
    base-url: ${SPECTOR_OLLAMA_BASE_URL:http://localhost:11434}
    model: ${SPECTOR_OLLAMA_MODEL:llama3.2}
    embed-model: ${SPECTOR_OLLAMA_EMBED_MODEL:nomic-embed-text}
  cors:
    allowed-origins: ${SPECTOR_CORS_ORIGINS:http://localhost:4200}

  # ── Spector Spring Auto-Configuration ──
  # SpectorAutoConfiguration (spector-spring module) creates a Spring-managed
  # SpectorMemory bean — with Micrometer metrics wrapping when an actuator
  # MeterRegistry is present. Replaces manual DefaultSpectorMemory construction.
  memory:
    enabled: true
    max-memories: ${SPECTOR_MAX_MEMORIES:0}
    dimensions: ${SPECTOR_DIMENSIONS:768}
    persistence-mode: DISK
    persistence-path: ${SPECTOR_DATA_DIR:./spector-data}/cognitive
    capacity: ${SPECTOR_MAX_MEMORIES:10000}
    splade-enabled: false   # off until Ollama SPLADE model is available
    colbert-enabled: false  # off until Ollama ColBERT model is available
  embedding:
    model: ${SPECTOR_OLLAMA_EMBED_MODEL:nomic-embed-text}
    base-url: ${SPECTOR_OLLAMA_BASE_URL:http://localhost:11434}
    batch-size: 32
  metrics:
    enabled: true           # wrap SpectorMemory with Micrometer via Actuator MeterRegistry

# ── Server (Armeria) ──
server:
  port: ${spector.port}

# ── Spring Boot Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# ── DataSource (H2 file-based) ──
spring:
  application:
    name: spector-synapse
  jmx:
    enabled: false

# ── Logging ──
logging:
  level:
    root: INFO
    com.spectrayan.spector: DEBUG
    org.springframework.boot: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Application Info ──
info:
  app:
    name: Spector Synapse
    description: The central nervous system for cognitive memory
    version: ${revision:1.0.0-SNAPSHOT}
