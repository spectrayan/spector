# ═══════════════════════════════════════════════════════════════════
# Spector Cortex — Nginx Configuration
# ═══════════════════════════════════════════════════════════════════
# Serves the Angular SPA and reverse-proxies API requests to
# spector-node. SSE-compatible (no buffering on event streams).
# ═══════════════════════════════════════════════════════════════════

upstream spector_backend {
    server 127.0.0.1:7070;
    keepalive 32;
}

server {
    listen 3000;
    server_name _;

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Static Files (Angular SPA) ───────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively (hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SSE Event Stream — NO buffering ──────────────────────────
    location /api/v1/events {
        proxy_pass http://spector_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE: disable all buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;

        # Disable gzip for SSE (prevents buffering)
        gzip off;
    }

    # ── SSE Telemetry Stream — NO buffering ──────────────────────
    location /api/v1/telemetry/stream {
        proxy_pass http://spector_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
        gzip off;
    }

    # ── API Reverse Proxy ────────────────────────────────────────
    location /api/ {
        proxy_pass http://spector_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "keep-alive";

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Health Check Proxy ───────────────────────────────────────
    location /health {
        proxy_pass http://spector_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── Prometheus Metrics Proxy ─────────────────────────────────
    location /metrics {
        proxy_pass http://spector_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # ── MCP Streamable HTTP (MCP 2025-03-26) ────────────────────────
    # Single endpoint handling POST (JSON-RPC), GET (SSE notifications),
    # and DELETE (session cleanup). Must not buffer SSE streams.
    location = /mcp {
        proxy_pass http://spector_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE: disable all buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
        gzip off;
    }

    # ── MCP Legacy SSE Transport (backward compat) ────────────────
    location /mcp/ {
        proxy_pass http://spector_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE: disable all buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
        gzip off;
    }

    # ── Angular SPA Fallback ─────────────────────────────────────
    # Must be last — serves index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
