# ═══════════════════════════════════════════════════════════════════
# Spector Synapse — Docker Compose (Full Stack) v0.1.0-alpha
# ═══════════════════════════════════════════════════════════════════
#
# Three-container stack:
#   - Synapse (Spring Boot 4 / Armeria backend)
#   - Ollama (Local LLM serving)
#   - Cortex (Angular 22 frontend via Nginx)
#
# Usage:
#   docker compose -f docker-compose.synapse.yml up --build
#   docker compose -f docker-compose.synapse.yml up --build -d
#   docker compose -f docker-compose.synapse.yml down -v
#
# Quick start (Docker Hub, memory-only):
#   docker compose -f docker-compose.synapse.yml up
#
# With chat enabled:
#   SPECTOR_CHAT_ENABLED=true docker compose -f docker-compose.synapse.yml up
#
# Endpoints:
#   UI:         http://localhost:4200
#   API:        http://localhost:7070/api/v1/
#   System:     http://localhost:7070/api/v1/system/status
#   Features:   http://localhost:7070/api/v1/features
#   Ollama:     http://localhost:11434
# ═══════════════════════════════════════════════════════════════════

name: spector-synapse

services:
  synapse:
    build:
      context: .
      dockerfile: synapse/spector-synapse/Dockerfile
    # Alternatively, use pre-built Docker Hub image:
    # image: spectrayan/spector-synapse:0.1.0-alpha
    container_name: spector-synapse
    ports:
      - "7070:7070"
    environment:
      # ── Core ──
      SPECTOR_PORT: 7070
      SPECTOR_API_KEY: ${SPECTOR_API_KEY:-spector-dev-key}
      SPECTOR_DATA_DIR: /data
      SPECTOR_CORS_ORIGINS: http://localhost:4200,http://localhost:7070

      # ── Ollama LLM ──
      SPECTOR_OLLAMA_BASE_URL: http://ollama:11434
      SPECTOR_OLLAMA_MODEL: qwen3.5:latest
      SPECTOR_OLLAMA_EMBED_MODEL: nomic-embed-text

      # ── Feature Flags ──
      SPECTOR_CHAT_ENABLED: ${SPECTOR_CHAT_ENABLED:-false}
      SPECTOR_AGENT_CHAT_ENABLED: ${SPECTOR_AGENT_CHAT_ENABLED:-false}
      SPECTOR_AGENT_WORKSPACES_ENABLED: ${SPECTOR_AGENT_WORKSPACES_ENABLED:-false}
      SPECTOR_TAG_EXTRACTION_ENABLED: ${SPECTOR_TAG_EXTRACTION_ENABLED:-true}
      SPECTOR_ENTITY_EXTRACTION_ENABLED: ${SPECTOR_ENTITY_EXTRACTION_ENABLED:-true}
      SPECTOR_REFLECTION_ENABLED: ${SPECTOR_REFLECTION_ENABLED:-true}
      SPECTOR_GPU_ENABLED: ${SPECTOR_GPU_ENABLED:-false}
      SPECTOR_CLUSTER_ENABLED: ${SPECTOR_CLUSTER_ENABLED:-false}
      SPECTOR_CONNECTORS_ENABLED: ${SPECTOR_CONNECTORS_ENABLED:-false}
      SPECTOR_BENCHMARKS_ENABLED: ${SPECTOR_BENCHMARKS_ENABLED:-false}

      # ── JVM ──
      JAVA_OPTS: "-XX:+UseZGC -XX:+ZGenerational -Xmx1g"
    volumes:
      - synapse-data:/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7070/api/v1/system/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: spector-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  cortex:
    build:
      context: .
      dockerfile: cortex/spector-cortex/Dockerfile
    # Alternatively, use pre-built Docker Hub image:
    # image: spectrayan/spector-cortex:0.1.0-alpha
    container_name: spector-cortex
    ports:
      - "4200:80"
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  synapse-data:
    driver: local
  ollama-models:
    driver: local
