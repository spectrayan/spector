name: CodeQL Issue Sync

on:
  schedule:
    - cron: '0 8 * * 1' # Runs every Monday at 8:00 AM UTC
  workflow_dispatch: # Allows manual trigger

permissions:
  issues: write
  security-events: read

jobs:
  sync-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Sync CodeQL Alerts to Issues
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Fetching open CodeQL alerts...');
            const { data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            console.log(`Found ${alerts.length} open alert(s).`);

            if (alerts.length === 0) {
              console.log('No open alerts found.');
              return;
            }

            // Group alerts by rule ID
            const groups = {};
            for (const alert of alerts) {
              const ruleId = alert.rule.id;
              if (!groups[ruleId]) {
                groups[ruleId] = {
                  rule: alert.rule,
                  alerts: []
                };
              }
              groups[ruleId].alerts.push(alert);
            }

            // Fetch existing open issues with the label 'security-alert'
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security-alert'
            });

            for (const ruleId in groups) {
              const group = groups[ruleId];
              const severity = group.rule.security_severity_level || group.rule.severity || 'unknown';
              const description = group.rule.description || 'No description provided.';
              const count = group.alerts.length;
              
              const title = `[Security Alert] Fix ${ruleId} (${count} occurrence${count > 1 ? 's' : ''})`;
              
              // Check if an issue containing the ruleId already exists
              const existingIssue = issues.find(i => i.title.includes(ruleId));
              
              if (existingIssue) {
                console.log(`Issue already exists for ${ruleId}: ${existingIssue.html_url}`);
                continue;
              }
              
              let body = `### CodeQL Alert: **${ruleId}**\n\n`;
              body += `* **Severity:** ${severity.toUpperCase()}\n`;
              body += `* **Description:** ${description}\n\n`;
              body += `#### Occurrences:\n`;
              
              for (const alert of group.alerts) {
                const location = alert.most_recent_instance?.location;
                if (!location) continue;
                const file = location.path;
                const startLine = location.start_line;
                const message = alert.most_recent_instance.message?.text || 'CodeQL finding';
                const url = alert.html_url;
                body += `* [${file}:L${startLine}](${url}) - ${message}\n`;
              }
              
              body += `\n---\n*This issue was auto-generated by the CodeQL Issue Sync workflow. Once the alerts are resolved in code and scanned, CodeQL will close the alerts, and you can close this tracking issue.*`;
              
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security-alert', 'bug']
              });
              
              console.log(`Created issue for ${ruleId}: ${newIssue.data.html_url}`);
            }
