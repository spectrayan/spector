# Automatically add new issues and PRs to the Spector Roadmap project board.
# Uses the official GitHub action: https://github.com/actions/add-to-project
#
# Requires a PAT or GitHub App token with `project` scope stored as
# the repository secret ADD_TO_PROJECT_PAT (classic PAT with project scope),
# or use the built-in GITHUB_TOKEN if the project is in the same org and
# the "Allow GitHub Actions to create and approve pull requests" setting
# is enabled under org Settings > Actions > General.
#
# For org-level projects, a PAT with `project` and `repo` scopes is needed.

name: Add to Roadmap Project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    name: Add to Spector Roadmap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/spectrayan/projects/4
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
